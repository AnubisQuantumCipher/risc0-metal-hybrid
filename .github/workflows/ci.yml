name: ci
on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# CI needs nothing beyond reading the repo contents.
permissions:
  contents: read

# GitHub-hosted macOS runners are virtualized and do NOT expose a Metal GPU that
# satisfies risc0-zkp's requirement (MTLArgumentBuffersTier::Tier2). So the Metal
# lane cannot run there. This CI validates what hosted runners CAN: the patch
# compiles (including the Metal shaders, via the Metal compiler), the CPU lane
# proves + verifies, AND the runtime GPU probe correctly falls back to the CPU
# lane on the GPU-less runner instead of panicking. The Metal lane itself is
# validated on real Apple Silicon hardware — see RESULT.md and the committed
# evidence — and, optionally, by the self-hosted job below.

jobs:
  lint-fmt:
    # rustfmt is enforced so the tree can never drift from `cargo fmt` again.
    # (fmt only parses manifests; no risc0 toolchain needed.)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (Node 24)
        with:
          persist-credentials: false
      - name: rustfmt --check (all three workspaces, incl. the guest)
        run: |
          rustup component add rustfmt
          cargo fmt --all --check --manifest-path e2e/Cargo.toml
          cargo fmt --all --check --manifest-path e2e/methods/guest/Cargo.toml
          cargo fmt --all --check --manifest-path m0-metalhal-smoke/Cargo.toml

  patch-consistency:
    # The vendored crate must be exactly pristine 4.0.4 + patches/. This guards
    # against the patch and the vendored tree drifting apart.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (Node 24)
        with:
          persist-credentials: false
      - name: Download pristine risc0-circuit-rv32im 4.0.4
        run: |
          curl -sL -A "r0mh-ci" \
            -o crate.tgz \
            "https://static.crates.io/crates/risc0-circuit-rv32im/risc0-circuit-rv32im-4.0.4.crate"
          tar xzf crate.tgz
      - name: Apply the committed patch and full-tree diff against vendor/
        run: |
          # The diff is rooted at a/risc0-circuit-rv32im-4.0.4/...; -p1 strips
          # the a/ prefix and targets the extracted crate dir at the repo root.
          patch -p1 < patches/risc0-circuit-rv32im-4.0.4-metal-hybrid.diff
          # Full recursive diff (not a per-file allowlist), excluding only
          # cargo-generated metadata that the registry tarball carries but the
          # vendored tree may not. Any source-level drift fails the job.
          diff -ruN \
            --exclude=.cargo-checksum.json --exclude=.cargo_vcs_info.json \
            --exclude=.cargo-ok --exclude=Cargo.toml.orig --exclude=Cargo.lock \
            --exclude=target \
            risc0-circuit-rv32im-4.0.4 vendor/risc0-circuit-rv32im \
            || { echo "FAIL: vendor/ is not exactly pristine 4.0.4 + patches/"; exit 1; }
          echo "OK: vendor/ == pristine 4.0.4 + patches/ (full-tree)"

  build-and-cpu-lane:
    # Hosted Apple Silicon runner: builds the patched stack, proves the CPU
    # lane, and confirms the runtime probe falls back to CPU on the GPU-less
    # virtualized runner (default invocation, no R0_DISABLE_METAL).
    runs-on: macos-14
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (Node 24)
        with:
          persist-credentials: false
      - name: Install RISC Zero toolchain
        run: |
          curl -sL https://risczero.com/install -o rzup-install.sh
          bash rzup-install.sh
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
      - name: rzup install (pinned)
        run: |
          rzup install rust 1.94.1
          rzup install cargo-risczero 3.0.5
      - name: Smoke crate compiles (Metal HAL shaders included)
        # The smoke tests themselves need a Tier-2 GPU to run, but compiling the
        # crate catches Metal-HAL API rot on every push.
        run: cargo build --release --manifest-path m0-metalhal-smoke/Cargo.toml --tests
      - name: Build the patched stack (compiles Metal shaders too)
        run: cargo build --release --manifest-path e2e/Cargo.toml
      - name: clippy, -D warnings (smoke + host/methods)
        # RISC0_SKIP_BUILD: clippy's rustc wrapper breaks the guest's separate
        # riscv cross-compile; the guest is built by the build step above, the
        # host-side crates are linted here. (The vendored crate compiles as a
        # dependency but is not lint-gated — upstream code keeps upstream lints.)
        run: |
          rustup component add clippy
          cargo clippy --release --all-targets --manifest-path m0-metalhal-smoke/Cargo.toml -- -D warnings
          RISC0_SKIP_BUILD=1 cargo clippy --release --manifest-path e2e/Cargo.toml -p host -p methods -- -D warnings
      - name: Host unit tests (mirrors vs independent reference vectors)
        run: cargo test --release --manifest-path e2e/Cargo.toml -p host
      - name: Vendored crate tests (temp copy; the GPU-dependent test self-skips here)
        # Compiles the vendored crate's test module on every push (it is
        # otherwise only compiled by validate.sh on Apple Silicon) and runs the
        # 70 unit tests; the sliced-buffer negative test skips with a notice on
        # this GPU-less runner.
        run: |
          work=$(mktemp -d)
          cp -R vendor/risc0-circuit-rv32im "$work/"
          cd "$work/risc0-circuit-rv32im"
          cargo test --release --features prove --lib
      - name: CPU lane — assert CPU circuit HAL ran + receipt verifies
        run: |
          out=$(RUST_LOG=debug R0_DISABLE_METAL=1 ./e2e/target/release/host 2>&1)
          echo "$out" | tail -5
          echo "$out" | grep -q "risc0_circuit_rv32im::prove::hal::cpu" \
            || { echo "FAIL: CPU circuit HAL did not run"; exit 1; }
          echo "$out" | grep -q "RECEIPT VERIFIED" \
            || { echo "FAIL: receipt did not verify"; exit 1; }
      - name: CPU lane — real-dependency hash guest verifies (reduced iters for CI)
        run: |
          out=$(R0_HASH_ITERS=64 R0_DISABLE_METAL=1 ./e2e/target/release/host hash 2>&1)
          echo "$out" | tail -3
          echo "$out" | grep -q "RECEIPT VERIFIED" \
            || { echo "FAIL: hash workload receipt did not verify"; exit 1; }
      - name: Default lane — runtime probe must fall back to CPU on GPU-less runner
        run: |
          # No R0_DISABLE_METAL: the runtime Tier-2 probe should detect the
          # virtualized GPU is unsuitable and fall back rather than panic.
          out=$(RUST_LOG=debug ./e2e/target/release/host 2>&1)
          echo "$out" | tail -5
          echo "$out" | grep -q "lane=cpu" \
            || { echo "FAIL: default lane did not fall back to CPU on GPU-less runner"; exit 1; }
          echo "$out" | grep -q "RECEIPT VERIFIED" \
            || { echo "FAIL: receipt did not verify"; exit 1; }

  metal-lane:
    # Full Metal validation — requires a REAL Apple Silicon GPU (Tier-2 argument
    # buffers), which hosted runners lack. Skipped by default. To enable: register
    # a self-hosted arm64 macOS runner with GPU access and set the repo variable
    # APPLE_SILICON_SELF_HOSTED=true.
    if: ${{ vars.APPLE_SILICON_SELF_HOSTED == 'true' }}
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (Node 24)
        with:
          persist-credentials: false
      - name: Full validation suite (correctness + fail-closed; emits evidence bundle)
        # Runs every check in order — patch consistency, fmt, clippy, smoke
        # parity, vendored-crate tests (incl. the sliced-buffer negative test),
        # all three workloads on BOTH lanes with the active lane asserted from
        # the prover's own debug logs, and the fail-closed checks — and writes
        # evidence/<UTC>/evidence.{json,md} + raw logs.
        #
        # --require-metal: this job exists to validate the Metal lane, so a
        # runner without a usable Metal lane (misconfigured/virtualized/headless
        # self-hosted box) FAILS the metal-capability check instead of skipping
        # the metal checks and going green on CPU-only coverage.
        run: ./scripts/validate.sh --ci --require-metal
      - name: Upload validation evidence bundle
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: metal-lane-evidence
          path: evidence/
          if-no-files-found: warn
