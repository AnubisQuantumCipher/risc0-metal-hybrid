    "anyhow/std",
    "derive_more/std",
    "risc0-binfmt/std",
    "risc0-zkp/std",
    "serde/std",
]
witgen_debug = []

[lib]
name = "risc0_circuit_rv32im"
path = "src/lib.rs"

[[bin]]
name = "bigint2-analyze"
