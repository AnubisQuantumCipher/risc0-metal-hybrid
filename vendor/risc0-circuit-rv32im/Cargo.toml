[[example]]
name = "rv32im"
path = "examples/rv32im.rs"
required-features = ["prove"]

[dependencies.anyhow]
version = "1.0"
default-features = false

[dependencies.bytemuck]
version = "1.13"

[dependencies.derive_more]
version = "2.0.1"
features = [
    "add",
    "add_assign",
    "debug",
]
default-features = false

[dependencies.gdbstub]
version = "0.7"
optional = true

[dependencies.gdbstub_arch]
version = "0.3"
