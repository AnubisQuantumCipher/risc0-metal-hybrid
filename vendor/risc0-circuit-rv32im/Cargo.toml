[package]
edition = "2021"
name = "risc0-circuit-rv32im"
version = "4.0.4"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "RISC Zero circuit for rv32im"
homepage = "https://risczero.com/"
readme = false
license = "Apache-2.0"
repository = "https://github.com/risc0/risc0/"

[features]
cuda = [
    "prove",
    "risc0-circuit-rv32im-sys/cuda",
    "risc0-sys/cuda",
    "risc0-zkp/cuda",
]
default = []
execute = [
