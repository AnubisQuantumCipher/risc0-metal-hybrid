[dependencies.risc0-core]
version = "3.0.1"
default-features = false

[dependencies.risc0-zkp]
version = "3.0.4"
default-features = false

# On Apple Silicon macOS, always compile risc0-zkp's Metal HAL so the hybrid
# Metal lane is available with no feature flags or user configuration.
[target.'cfg(all(target_os = "macos", target_arch = "aarch64"))'.dependencies.risc0-zkp]
version = "3.0.4"
default-features = false
